{% load static %}
<header class="site-header">
    <div class="container navbar-row">
        <a href="{% url 'home:home' %}" class="brand">
            <span class="brand-mark">
                <span class="material-symbols-outlined">home_work</span>
            </span>
            <span class="brand-name">HABITA</span>
        </a>

        <nav class="main-nav">
            <a href="{% url 'properties:list' %}">Propiedades</a>
            <a href="#">Zonas</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>
        </nav>

        <div class="nav-actions">
            {% if habita_logged_in and habita_user %}
                <a href="{% url 'accounts:dashboard' %}" class="btn-link">
                    {{ habita_user.full_name }}
                </a>
                <a href="{% url 'accounts:favorites' %}" class="btn-link">
                    Favoritos
                </a>
                <a href="{% url 'accounts:logout' %}" class="btn-primary btn-small">
                    Cerrar sesión
                </a>
            {% else %}
                <a href="{% url 'accounts:login' %}" class="btn-link">Iniciar Sesión</a>
                <a href="{% url 'accounts:register' %}" class="btn-primary btn-small">Registrarse</a>
            {% endif %}
        </div>
    </div>
</header>
