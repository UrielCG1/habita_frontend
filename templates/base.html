{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HABITA{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="site-shell">
        <header class="site-header">
            <div class="container header-row">
                <a href="{% url 'home:home' %}" class="brand">
                    <div class="brand-icon">
                        <span class="material-symbols-outlined">home_work</span>
                    </div>
                    <span class="brand-text">HABITA</span>
                </a>

                <nav class="main-nav">
                    <a href="{% url 'properties:list' %}">Propiedades</a>
                    <a href="#">Zonas</a>
                    <a href="#">Nosotros</a>
                    <a href="#">Contacto</a>
                </nav>

                <div class="header-actions">
                    <a href="#" class="btn-link">Iniciar Sesión</a>
                    <a href="#" class="btn-primary btn-small">Registrarse</a>
                </div>
            </div>
        </header>

        <main class="site-main">
            {% block content %}{% endblock %}
        </main>

        {% include "includes/footer.html" %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
